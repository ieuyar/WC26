name: Daily dashboard refresh

# Runs every morning at 06:00 UTC during the World Cup so the dashboard
# picks up overnight results. Can also be triggered manually from the
# Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'      # 06:00 UTC daily
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write             # so the job can commit and push updates

env:
  # Opt into Node.js 24 for actions. Node.js 20 deprecated on the
  # runner from June 16, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write API token
        run: echo "${{ secrets.FOOTBALL_DATA_TOKEN }}" > api_token.txt

      - name: Pull live match results
        run: python3 live_ingest.py
        continue-on-error: true   # don't kill the build if no new matches

      - name: Re-run simulation pipeline
        run: |
          python3 run_simulation.py
          python3 run_engines.py
          python3 engine_matches.py
          python3 reorder_to_fifa.py
          python3 compute_ranks.py
          python3 build_live_dashboard.py

      - name: Copy dashboard to root (index.html)
        run: cp dashboard_live.html index.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_live.html index.html wc2026_data.json \
                  simulation_output/ live_results.csv
          if git diff --staged --quiet; then
            echo "No changes - skipping commit."
          else
            git commit -m "Daily refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
